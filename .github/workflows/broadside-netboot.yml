name: broadside-netboot

permissions:
  contents: read

on:
  pull_request:
    paths:
      - ".github/workflows/broadside-netboot.yml"
      - "flake.nix"
      - "flake.lock"
      - "hosts/broadside/**"
      - "scripts/build-broadside-installer-assets.sh"
      - "scripts/nix-in-docker.sh"
      - "scripts/validate-pxe-setup.sh"
      - "stacks/infrastructure/pxe/**"
  push:
    branches: [ main, master ]
    paths:
      - ".github/workflows/broadside-netboot.yml"
      - "flake.nix"
      - "flake.lock"
      - "hosts/broadside/**"
      - "scripts/build-broadside-installer-assets.sh"
      - "scripts/nix-in-docker.sh"
      - "scripts/validate-pxe-setup.sh"
      - "stacks/infrastructure/pxe/**"
  workflow_dispatch:

jobs:
  build-netboot-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Broadside asset scripts
        run: bash -n scripts/build-broadside-installer-assets.sh scripts/nix-in-docker.sh

      - name: Build Broadside netboot assets
        run: ./scripts/build-broadside-installer-assets.sh "$RUNNER_TEMP/broadside-netboot"

      - name: Verify generated asset bundle
        run: |
          set -euo pipefail
          for f in bzImage initrd netboot.ipxe homelab.tar.gz nixpkgs.tar.gz disko.tar.gz; do
            test -s "$RUNNER_TEMP/broadside-netboot/$f"
          done

      - name: Upload Broadside netboot bundle
        uses: actions/upload-artifact@v4
        with:
          name: broadside-netboot-assets
          path: ${{ runner.temp }}/broadside-netboot
          if-no-files-found: error
